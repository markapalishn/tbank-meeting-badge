<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Т-Банк Meeting Badge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="badge-container">
        <div class="capybara">
            <!-- Ходьба -->
            <svg class="capybara__svg--walk" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="16" width="32" height="14" fill="#8B7355"/>
                <rect x="10" y="20" width="28" height="1.5" fill="#9E8B73" opacity="0.4"/>
                <rect x="12" y="24" width="24" height="1.5" fill="#9E8B73" opacity="0.3"/>
                <rect x="4" y="8" width="16" height="16" fill="#8B7355"/>
                <rect x="6" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="14" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="7" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="15" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="4" y="16" width="4" height="4" fill="#A0825D"/>
                <rect x="4" y="16" width="2" height="1.5" fill="#333" opacity="0.6"/>
                <rect x="8" y="10" width="3" height="3" fill="#333"/>
                <rect x="16" y="10" width="3" height="3" fill="#333"/>
                <rect x="9" y="11" width="1" height="1" fill="#fff" opacity="0.9"/>
                <rect x="17" y="11" width="1" height="1" fill="#fff" opacity="0.9"/>
                <line x1="4" y1="17" x2="1" y2="15" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="18" x2="0" y2="18" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="19" x2="1" y2="21" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <rect class="leg-fl" x="14" y="30" width="3" height="6" fill="#6B5345"/>
                <rect class="leg-fr" x="22" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="32" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="38" y="30" width="3" height="6" fill="#6B5345"/>
                <rect class="tail" x="40" y="18" width="14" height="4" fill="#6B5345"/>
            </svg>

            <!-- Еда -->
            <svg class="capybara__svg--eat" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" style="display:none">
                <rect x="8" y="18" width="32" height="12" fill="#8B7355"/>
                <rect x="10" y="22" width="28" height="1.5" fill="#9E8B73" opacity="0.4"/>
                <rect x="4" y="12" width="16" height="16" fill="#8B7355"/>
                <rect x="6" y="8" width="4" height="5" fill="#8B7355"/>
                <rect x="14" y="8" width="4" height="5" fill="#8B7355"/>
                <rect x="7" y="9" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="15" y="9" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="8" y="14" width="3" height="2" fill="#333"/>
                <rect x="16" y="14" width="3" height="2" fill="#333"/>
                <line x1="4" y1="21" x2="1" y2="19" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="22" x2="0" y2="22" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="23" x2="1" y2="25" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <rect x="14" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="22" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="32" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="38" y="28" width="3" height="4" fill="#6B5345"/>
                <rect class="food" x="2" y="22" width="4" height="3" fill="#A0825D"/>
                <rect class="food" x="2" y="26" width="3" height="3" fill="#A0825D" opacity="0.7"/>
            </svg>

            <!-- Сон -->
            <svg class="capybara__svg--sleep" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" style="display:none">
                <rect x="8" y="16" width="32" height="14" fill="#8B7355"/>
                <rect x="10" y="20" width="28" height="1.5" fill="#9E8B73" opacity="0.4"/>
                <rect x="4" y="8" width="16" height="16" fill="#8B7355"/>
                <rect x="6" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="14" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="7" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="15" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <line x1="8" y1="12" x2="11" y2="12" stroke="#333" stroke-width="1.5"/>
                <line x1="16" y1="12" x2="19" y2="12" stroke="#333" stroke-width="1.5"/>
                <line x1="4" y1="17" x2="1" y2="16" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
                <line x1="4" y1="18" x2="1" y2="18" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
                <line x1="4" y1="19" x2="1" y2="20" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
                <rect x="14" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="22" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="32" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="38" y="28" width="3" height="4" fill="#6B5345"/>
                <text class="zzz zzz-1" x="44" y="8" fill="#A0825D" font-size="7" font-family="monospace">Z</text>
                <text class="zzz zzz-2" x="48" y="4" fill="#A0825D" font-size="5" font-family="monospace">z</text>
                <text class="zzz zzz-3" x="51" y="1" fill="#A0825D" font-size="4" font-family="monospace">z</text>
            </svg>

            <!-- Обнюхивание -->
            <svg class="capybara__svg--sniff" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" style="display:none">
                <rect x="8" y="18" width="32" height="12" fill="#8B7355"/>
                <rect x="10" y="22" width="28" height="1.5" fill="#9E8B73" opacity="0.4"/>
                <rect x="2" y="10" width="16" height="16" fill="#8B7355"/>
                <rect x="4" y="6" width="4" height="5" fill="#8B7355"/>
                <rect x="12" y="6" width="4" height="5" fill="#8B7355"/>
                <rect x="5" y="7" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="13" y="7" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="1" y="18" width="5" height="4" fill="#A0825D"/>
                <rect x="1" y="18" width="2" height="1.5" fill="#333" opacity="0.6"/>
                <rect x="6" y="12" width="3" height="3" fill="#333"/>
                <rect x="14" y="12" width="3" height="3" fill="#333"/>
                <rect x="7" y="13" width="1" height="1" fill="#fff"/>
                <rect x="15" y="13" width="1" height="1" fill="#fff"/>
                <line x1="1" y1="19" x2="-2" y2="17" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
                <line x1="1" y1="20" x2="-3" y2="20" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
                <line x1="1" y1="21" x2="-2" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
                <rect x="14" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="22" y="30" width="3" height="6" fill="#6B5345"/>
                <rect x="32" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="38" y="28" width="3" height="4" fill="#6B5345"/>
            </svg>

            <!-- Сидит (работает / читает) -->
            <svg class="capybara__svg--sit" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" style="display:none">
                <rect x="8" y="18" width="32" height="12" fill="#8B7355"/>
                <rect x="10" y="22" width="28" height="1.5" fill="#9E8B73" opacity="0.4"/>
                <rect x="4" y="8" width="16" height="16" fill="#8B7355"/>
                <rect x="6" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="14" y="4" width="4" height="5" fill="#8B7355"/>
                <rect x="7" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="15" y="5" width="2" height="3" fill="#A0825D" opacity="0.5"/>
                <rect x="4" y="16" width="4" height="4" fill="#A0825D"/>
                <rect x="8" y="10" width="3" height="3" fill="#333"/>
                <rect x="16" y="10" width="3" height="3" fill="#333"/>
                <rect x="9" y="11" width="1" height="1" fill="#fff" opacity="0.9"/>
                <rect x="17" y="11" width="1" height="1" fill="#fff" opacity="0.9"/>
                <line x1="4" y1="17" x2="1" y2="15" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="18" x2="0" y2="18" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <line x1="4" y1="19" x2="1" y2="21" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
                <rect x="14" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="22" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="32" y="28" width="3" height="4" fill="#6B5345"/>
                <rect x="38" y="28" width="3" height="4" fill="#6B5345"/>
            </svg>

            <!-- Кружка (для сценария «рабочий день») -->
            <svg class="capybara__mug" viewBox="0 0 12 14" xmlns="http://www.w3.org/2000/svg" style="display:none">
                <rect x="2" y="3" width="6" height="9" fill="#DFD2BD" rx="1"/>
                <rect x="8" y="5" width="3" height="4" fill="none" stroke="#DFD2BD" stroke-width="1" rx="1"/>
                <rect x="3" y="1" width="1" height="2" fill="#9E8B73" opacity="0.5"/>
                <rect x="5" y="0" width="1" height="3" fill="#9E8B73" opacity="0.4"/>
                <rect x="7" y="1" width="1" height="2" fill="#9E8B73" opacity="0.3"/>
            </svg>
        </div>
        <div class="employee-card">
            <div class="employee-card__top">
                <div class="employee-card__logo">
                    <img src="assets/svg/Logo_tbank.svg" alt="Т-Банк" width="86" height="86" />
                </div>
                <div class="employee-card__name-block">
                    <div class="employee-card__role">
                        <img src="assets/svg/icon-1.svg" alt="" class="employee-card__role-icon" width="23" height="23" />
                        <span class="employee-card__role-slash">/</span>
                        <span class="employee-card__role-text">менеджер продукта</span>
                    </div>
                    <div class="employee-card__full-name">Марк Апалишин</div>
                </div>
            </div>
            <p class="employee-card__areas">Интернет эквайринг, интерфейсные методы интеграции</p>
        </div>
    </div>
    <script src="capybara.js"></script>
</body>
</html>

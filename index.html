<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Т-Банк Meeting Badge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="badge-container">
        <div class="employee-card">
            <div class="employee-card__top">
                <div class="employee-card__logo">
                    <img src="assets/svg/Logo_tbank.svg" alt="Т-Банк" width="86" height="86" />
                </div>
                <div class="employee-card__name-block">
                    <div class="employee-card__role">
                        <img src="assets/svg/icon-1.svg" alt="" class="employee-card__role-icon" width="23" height="23" />
                        <span class="employee-card__role-slash">/</span>
                        <span class="employee-card__role-text">менеджер продукта</span>
                    </div>
                    <div class="employee-card__full-name">Марк Апалишин</div>
                </div>
            </div>
            <p class="employee-card__areas">Интернет эквайринг, интерфейсные методы интеграции</p>
        </div>
    </div>
</body>
</html>
